<body oncontextmenu="return false" oncopy="return false" oncut="return false" onpaste="return false">
    <header class="site-header">

<h1>Exercice : Subjonctif ou Indicatif ?</h1>
<p>Ces expressions sont suivies d’un verbe. Choisissez si ce verbe doit être au <strong>subjonctif (S)</strong> ou à l’<strong>indicatif (I)</strong>.</p>

<form id="exerciseForm">
  <label>1. Je suis contente que… 
    <select data-answer="S">
      <option value="">--</option>
      <option value="S">S</option>
      <option value="I">I</option>
    </select>
    <span class="feedback"></span>
  </label>

  <label>2. Il est probable que… 
    <select data-answer="I">
      <option value="">--</option>
      <option value="S">S</option>
      <option value="I">I</option>
    </select>
    <span class="feedback"></span>
  </label>

  <label>3. Il est possible que… 
    <select data-answer="S">
      <option value="">--</option>
      <option value="S">S</option>
      <option value="I">I</option>
    </select>
    <span class="feedback"></span>
  </label>

  <label>4. Je sais que… 
    <select data-answer="I">
      <option value="">--</option>
      <option value="S">S</option>
      <option value="I">I</option>
    </select>
    <span class="feedback"></span>
  </label>

  <label>5. Je doute que… 
    <select data-answer="S">
      <option value="">--</option>
      <option value="S">S</option>
      <option value="I">I</option>
    </select>
    <span class="feedback"></span>
  </label>

  <label>6. Je pense que… 
    <select data-answer="I">
      <option value="">--</option>
      <option value="S">S</option>
      <option value="I">I</option>
    </select>
    <span class="feedback"></span>
  </label>

  <label>7. Penses-tu que… ? 
    <select data-answer="S">
      <option value="">--</option>
      <option value="S">S</option>
      <option value="I">I</option>
    </select>
    <span class="feedback"></span>
  </label>

  <label>8. Je ne pense pas que… 
    <select data-answer="S">
      <option value="">--</option>
      <option value="S">S</option>
      <option value="I">I</option>
    </select>
    <span class="feedback"></span>
  </label>

  <label>9. J’espère que… 
    <select data-answer="I">
      <option value="">--</option>
      <option value="S">S</option>
      <option value="I">I</option>
    </select>
    <span class="feedback"></span>
  </label>

  <label>10. Je souhaite que… 
    <select data-answer="S">
      <option value="">--</option>
      <option value="S">S</option>
      <option value="I">I</option>
    </select>
    <span class="feedback"></span>
  </label>

  <div class="form-actions">
    <button type="button" onclick="checkAnswers()">Vérifier</button>
    <div class="nav-buttons">
      <a class="nav-button" href="subjonctif-exercice2.html">Retour</a>
    </div>
  </div>
</form>

<script>
function checkAnswers() {
  const selects = document.querySelectorAll('#exerciseForm select');
  selects.forEach(select => {
    const answer = select.dataset.answer;
    const feedback = select.nextElementSibling;
    if(select.value === "") {
      feedback.textContent = " ⚠ Choisissez S ou I";
      feedback.className = "feedback incorrect";
    } else if(select.value === answer) {
      feedback.textContent = "✔ Correct";
      feedback.className = "feedback correct";
    } else {
      feedback.textContent = "✖ Incorrect";
      feedback.className = "feedback incorrect";
    }
  });
}
</script>
</body>
